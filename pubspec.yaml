name: wifi
description: "WiFi — Persistent Private Audio Room"
publish_to: 'none'
version: 3.0.3+38

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.0

  # WebRTC
  flutter_webrtc: ^0.12.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Background Service
  flutter_foreground_task: ^8.17.0

  # Location
  geolocator: ^11.0.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Wi-Fi Scanning
  wifi_scan: ^0.4.1

  # Utilities
  shared_preferences: ^2.5.5
  uuid: ^4.5.1
  android_intent_plus: ^5.1.1
  permission_handler: ^11.4.0
  torch_light: ^2.0.0
  screen_brightness: ^2.1.11
  device_info_plus: ^13.1.0
  battery_plus: ^7.0.0
  package_info_plus: ^10.1.0
  dio: ^5.9.2
  path_provider: ^2.1.6
  open_filex: ^4.7.0
  firebase_analytics: ^11.6.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  googleapis_auth: ^1.6.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  assets:
    - shorebird.yaml
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/icon.png"
  min_sdk_android: 21
